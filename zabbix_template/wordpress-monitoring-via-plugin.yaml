zabbix_export:
  version: "7.4"
  template_groups:
    - uuid: a571c0d144b14fd4a87a9d9b2aa9fcd6
      name: Templates/Applications
    - uuid: 6dd186f838ac4a0d9ce07e8c43013e4e
      name: Templates/Applications/Wordpress
  templates:
    - uuid: 51f6e6b299d84c339da957a7089fc112
      template: "Wordpress monitoring via plugin"
      name: "Wordpress monitoring via plugin"
      description: "This is for monitoring Wordpress via plugin wordpress-zabbix-data"
      vendor:
        name: moesgaardsdk
        version: 7.0-0
      groups:
        - name: Templates/Applications
        - name: Templates/Applications/Wordpress
      items:
        - uuid: 090945367fa14558811cd2465531d8e9
          name: "{$WEBSITE} Monitoring"
          type: HTTP_AGENT
          key: "monitor.wp[{$WEBSITE}]"
          history: "0"
          value_type: TEXT
          description: |
            Get informartion from the Wordpress plugin.
            This is using dependent items to display data obtained
          url: "{$WEBSITE_PROTOCOL}{$WEBSITE}/wp-json/zabbix/v1/stats"
          headers:
            - name: X-Zabbix-Token
              value: "{$WORDPRESS_TOKEN}"
          tags:
            - tag: component
              value: Wordpress
        - uuid: f1e28400dd1e4fbbacd3c84037a61288
          name: "Autoload size"
          type: DEPENDENT
          key: wp.autoload_size_b
          units: b
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.metrics.autoload_size_b
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - "3600"
          master_item:
            key: "monitor.wp[{$WEBSITE}]"
          tags:
            - tag: component
              value: Wordpress
            - tag: System
              value: Wordpress
        - uuid: 3d78bd25d881467999e6af470fd136bd
          name: "CPU load 1 min"
          type: DEPENDENT
          key: wp.cpu_load_1min
          value_type: FLOAT
