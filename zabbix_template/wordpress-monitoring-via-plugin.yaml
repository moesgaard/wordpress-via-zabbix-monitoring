    - uuid: 2f07503f3e4b44cfb01d5beb01481fa7
      name: "Memory peak vs limit"
      yaxismax: "0"
      ymin_type_1: FIXED
      ymax_type_1: ITEM
      ymax_item_1:
        host: "Wordpress monitoring via plugin"
        key: wp.memory_limit
      graph_items:
        - color: 199C0D
          calc_fnc: ALL
          item:
            host: "Wordpress monitoring via plugin"
            key: wp.memory_peak_b
        - sortorder: "1"
