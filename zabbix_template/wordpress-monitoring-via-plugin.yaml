        - uuid: 5d9c1eaa34e04fe0b04525423953455b
          name: "Website status"
          type: DEPENDENT
          key: wp.status
          valuemap:
            name: "Website status"
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.metrics.status
              error_handler: CUSTOM_VALUE
              error_handler_params: "0"
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - "3600"
          master_item:
            key: "monitor.wp[{$WEBSITE}]"
          tags:
            - tag: component
              value: Wordpress
            - tag: System
              value: Wordpress
          triggers:
            - uuid: 5739cdd446e540c89318c41a259b6d54
              expression: "nodata(/Wordpress monitoring via plugin/wp.status,10m)=0"
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: "nodata(/Wordpress monitoring via plugin/wp.status,10m)=1"
              name: "{$WEBSITE} Monitoring failed"
              priority: DISASTER
        - uuid: adc16540e1344f1f854bed16ab0851f7
