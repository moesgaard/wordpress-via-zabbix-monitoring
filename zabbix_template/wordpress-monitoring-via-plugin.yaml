      discovery_rules:
        - uuid: a7807baccc2e4ee0b9bc1e4bb9292fe3
          name: "{HOST.NAME} Monitoring"
          type: DEPENDENT
          key: wordpress.monitor
          enabled_lifetime_type: DISABLE_AFTER
          enabled_lifetime: 1h
          item_prototypes:
            - uuid: 69a2fce035da4403ac2b50ab16dfdec3
              name: "{#PLUGIN_NAME}"
              type: DEPENDENT
              key: "wp.plugin[{#PLUGIN_NAME}]"
              value_type: CHAR
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.metrics.plugins["{#PLUGIN_NAME}"]'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - "3600"
              master_item:
                key: "monitor.wp[{$WEBSITE}]"
              tags:
                - tag: component
                  value: Wordpress
                - tag: Type
                  value: Plug-in
          master_item:
            key: "monitor.wp[{$WEBSITE}]"
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.plugins_discovery
      macros:
        - macro: "{$WEBSITE}"
        - macro: "{$WEBSITE_PROTOCOL}"
          value: "https://"
        - macro: "{$WORDPRESS_CPU_LOAD_1M_AVG}"
        - macro: "{$WORDPRESS_CPU_LOAD_1M_DIST}"
        - macro: "{$WORDPRESS_CPU_LOAD_1M_HIGH}"
        - macro: "{$WORDPRESS_CPU_LOAD_1M_WARN}"
        - macro: "{$WORDPRESS_CPU_LOAD_5M_AVG}"
        - macro: "{$WORDPRESS_CPU_LOAD_5M_DIST}"
        - macro: "{$WORDPRESS_CPU_LOAD_5M_HIGH}"
        - macro: "{$WORDPRESS_CPU_LOAD_5M_WARN}"
        - macro: "{$WORDPRESS_CPU_LOAD_15M_AVG}"
        - macro: "{$WORDPRESS_CPU_LOAD_15M_DIST}"
        - macro: "{$WORDPRESS_CPU_LOAD_15M_HIGH}"
        - macro: "{$WORDPRESS_CPU_LOAD_15M_WARN}"
        - macro: "{$WORDPRESS_CRON_JAMMED}"
        - macro: "{$WORDPRESS_RESENT_ERROR_COUNT}"
        - macro: "{$WORDPRESS_TOKEN}"
      valuemaps:
        - uuid: 52842f0cad0d4b5192eea4925d095e9f
          name: "Website status"
          mappings:
            - value: "1"
              newvalue: Healthy
            - value: "0"
              newvalue: Failure
  graphs:
    - uuid: 756747abee414559bf6bc756762fe452
      name: "CPU load"
      yaxismax: "0"
      graph_items:
        - color: 199C0D
          calc_fnc: ALL
          item:
            host: "Wordpress monitoring via plugin"
            key: wp.cpu_load_1min
        - sortorder: "1"
          color: F63100
          calc_fnc: ALL
          item:
            host: "Wordpress monitoring via plugin"
            key: wp.cpu_load_5min
        - sortorder: "2"
